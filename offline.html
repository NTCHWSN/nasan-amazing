<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2C5F8D">
  <title>Na San Amazing - Offline</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #1A1A2E;
      color: #F8F4E8;
      font-family: Tahoma, Arial, sans-serif;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      color: #F4B942;
      font-size: 28px;
    }
    p {
      max-width: 520px;
      margin: 0;
      line-height: 1.6;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Na San Amazing</h1>
      <p>This app is offline. Open it once while connected to the internet or from the local server so the game files can be cached for offline use.</p>
    </section>
  </main>
</body>
</html>
